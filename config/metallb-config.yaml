apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: wazalink-pool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.100.2/32
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: wazalink-l2adv
  namespace: metallb-system
spec:
  ipAddressPools:
    - wazalink-pool
